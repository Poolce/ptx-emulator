name: Static analysis

on: [pull_request]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build python3-pip
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}
      - uses: ZedThree/clang-tidy-review@v0.23.1
        id: review
        name: Run clang-tidy
        with:
          build_dir: build
          install_commands: |
            apt-get update
            apt-get install -y --no-install-recommends ninja-build clang-17 ccache python3 python3-pip
            apt-get install -y --no-install-recommends python3-jinja2
          cmake_command: >
            cmake -S . -B build
            -GNinja
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            && cmake --build build --target encoder_codegen --parallel
          config_file: .clang-tidy
          exclude: 3rdparty test
          split_workflow: true
          lgtm_comment_body: ""
        env:
          CC: clang-16
          CXX: clang++-16
      - if: steps.review.outputs.total_comments > 0
        run: |
          echo "clang-tidy run has failed. See 'Run clang-tidy' stage logs"
          exit 1
